<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a0533">
<title>Sweet Crush — Match-3 Puzzle</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Fredoka:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Fredoka',sans-serif;background:#1a0533}
:root{
  --candy-red:#ff3b5c;--candy-orange:#ff8b3b;--candy-yellow:#ffd23b;
  --candy-green:#3bff8b;--candy-blue:#3bb8ff;--candy-purple:#b43bff;
  --candy-pink:#ff3bb8;--bg-dark:#1a0533;--bg-mid:#2d0a54;--bg-light:#3f1170;
  --gold:#ffd700;--star:#ffcc00;
}
#app{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;position:relative;overflow:hidden;background:linear-gradient(180deg,#1a0533 0%,#2d0a54 40%,#1a0533 100%)}

/* ── Particles BG ── */
.bg-particles{position:fixed;inset:0;pointer-events:none;z-index:0}
.bg-particles span{position:absolute;width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.15);animation:float-up linear infinite}
@keyframes float-up{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:.5}100%{transform:translateY(-10vh) scale(1);opacity:0}}

/* ── Screens ── */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;transition:opacity .4s,transform .4s}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(.95)}

/* ── Title Screen ── */
.title-logo{font-family:'Baloo 2',cursive;font-size:clamp(42px,10vw,64px);font-weight:800;text-align:center;line-height:1;margin-bottom:8px;
  background:linear-gradient(135deg,#ff3b88,#ffd23b,#3bff8b,#3bb8ff,#b43bff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 4px 20px rgba(255,59,136,.4));animation:logo-pulse 3s ease-in-out infinite}
@keyframes logo-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
.title-sub{font-size:clamp(14px,3.5vw,18px);color:rgba(255,255,255,.6);margin-bottom:40px;font-weight:400;letter-spacing:2px}
.btn-play{
  padding:16px 48px;border-radius:50px;border:none;font-family:'Baloo 2',cursive;font-size:22px;font-weight:700;
  color:#fff;cursor:pointer;position:relative;overflow:hidden;
  background:linear-gradient(135deg,#ff3b88,#ff8b3b);
  box-shadow:0 6px 30px rgba(255,59,136,.5),inset 0 1px 0 rgba(255,255,255,.3);
  transition:transform .15s,box-shadow .15s;letter-spacing:1px}
.btn-play:active{transform:scale(.95);box-shadow:0 2px 15px rgba(255,59,136,.3)}
.btn-play::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(transparent,rgba(255,255,255,.1),transparent);transform:rotate(45deg);animation:btn-shine 3s infinite}
@keyframes btn-shine{0%{transform:translateX(-100%) rotate(45deg)}100%{transform:translateX(100%) rotate(45deg)}}
.title-candies{display:flex;gap:12px;margin-bottom:30px}
.title-candy{width:44px;height:44px;border-radius:12px;animation:candy-bounce 2s ease-in-out infinite}
.title-candy:nth-child(1){background:var(--candy-red);animation-delay:0s}
.title-candy:nth-child(2){background:var(--candy-orange);animation-delay:.15s}
.title-candy:nth-child(3){background:var(--candy-yellow);animation-delay:.3s}
.title-candy:nth-child(4){background:var(--candy-green);animation-delay:.45s}
.title-candy:nth-child(5){background:var(--candy-blue);animation-delay:.6s}
.title-candy:nth-child(6){background:var(--candy-purple);animation-delay:.75s}
@keyframes candy-bounce{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-12px) rotate(5deg)}}

/* ── HUD ── */
.hud{width:100%;max-width:400px;display:flex;justify-content:space-between;align-items:center;padding:10px 16px;z-index:5;flex-shrink:0}
.hud-box{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:6px 14px;text-align:center;min-width:70px}
.hud-label{font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.hud-val{font-family:'Baloo 2',cursive;font-size:22px;font-weight:700;color:#fff;line-height:1.1}
.hud-val.score{color:var(--gold)}
.hud-val.moves{color:var(--candy-blue)}
.hud-val.target{color:var(--candy-green)}

/* ── Level Banner ── */
.level-banner{font-family:'Baloo 2',cursive;font-size:16px;color:rgba(255,255,255,.7);margin:4px 0 6px;z-index:5}

/* ── Progress Bar ── */
.progress-wrap{width:100%;max-width:400px;padding:0 16px;z-index:5;margin-bottom:8px}
.progress-bar{height:8px;background:rgba(255,255,255,.1);border-radius:10px;overflow:hidden;position:relative}
.progress-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,#ff3b88,#ffd23b);transition:width .4s ease;position:relative}
.progress-fill::after{content:'';position:absolute;right:0;top:-1px;width:12px;height:10px;border-radius:50%;background:#fff;box-shadow:0 0 8px rgba(255,255,255,.6)}
.star-markers{display:flex;justify-content:space-between;padding:0 2px;margin-top:2px}
.star-marker{font-size:14px;opacity:.3;transition:opacity .3s}
.star-marker.earned{opacity:1;animation:star-pop .4s ease}
@keyframes star-pop{0%{transform:scale(0)}50%{transform:scale(1.4)}100%{transform:scale(1)}}

/* ── Board ── */
.board-wrap{flex:1;display:flex;align-items:center;justify-content:center;z-index:5;padding:4px}
.board{display:grid;gap:3px;padding:8px;border-radius:16px;background:rgba(0,0,0,.3);border:2px solid rgba(255,255,255,.08);box-shadow:0 8px 40px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.05);position:relative}
.cell{border-radius:10px;position:relative;cursor:pointer;transition:transform .12s;display:flex;align-items:center;justify-content:center}
.cell:active{transform:scale(.9)}
.candy{width:100%;height:100%;border-radius:10px;position:absolute;inset:0;transition:transform .2s ease,opacity .2s;display:flex;align-items:center;justify-content:center;font-size:clamp(22px,5vw,30px)}
.candy.selected{transform:scale(.85);box-shadow:0 0 20px rgba(255,255,255,.5)}
.candy.hint{animation:hint-pulse 1s ease-in-out infinite}
@keyframes hint-pulse{0%,100%{transform:scale(1);box-shadow:none}50%{transform:scale(1.1);box-shadow:0 0 15px rgba(255,255,255,.4)}}
.candy.matched{animation:match-pop .35s ease forwards}
@keyframes match-pop{0%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:.5}100%{transform:scale(0);opacity:0}}
.candy.dropping{animation:candy-drop .3s ease}
@keyframes candy-drop{0%{transform:translateY(-60px);opacity:0}100%{transform:translateY(0);opacity:1}}
.candy.swapping{transition:transform .25s ease}

/* Candy Colors — using emoji for cross-platform visual appeal */
.candy-0{background:linear-gradient(135deg,#ff3b5c,#ff6b8a)}
.candy-1{background:linear-gradient(135deg,#ff8b3b,#ffab6b)}
.candy-2{background:linear-gradient(135deg,#ffd23b,#ffe56b)}
.candy-3{background:linear-gradient(135deg,#3bff8b,#6bffab)}
.candy-4{background:linear-gradient(135deg,#3bb8ff,#6bd0ff)}
.candy-5{background:linear-gradient(135deg,#b43bff,#cc6bff)}

/* Special candies */
.candy.striped-h::after,.candy.striped-v::after{content:'';position:absolute;background:rgba(255,255,255,.4);border-radius:2px}
.candy.striped-h::after{width:70%;height:3px;left:15%}
.candy.striped-v::after{height:70%;width:3px;top:15%}
.candy.wrapped{box-shadow:inset 0 0 0 3px rgba(255,255,255,.5)}
.candy.color-bomb{background:radial-gradient(circle,#fff 0%,#333 50%,#000 100%) !important;box-shadow:0 0 12px rgba(255,255,255,.5)}

/* ── Score popup ── */
.score-popup{position:absolute;pointer-events:none;font-family:'Baloo 2',cursive;font-weight:700;color:#ffd23b;text-shadow:0 2px 8px rgba(0,0,0,.5);animation:score-fly .8s ease forwards;z-index:20}
@keyframes score-fly{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-50px) scale(1.3)}}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px)}
.modal{background:linear-gradient(160deg,#2d0a54,#1a0533);border:1px solid rgba(255,255,255,.15);border-radius:24px;padding:32px 28px;text-align:center;max-width:340px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.modal h2{font-family:'Baloo 2',cursive;font-size:28px;color:#fff;margin-bottom:8px}
.modal .stars-row{display:flex;justify-content:center;gap:8px;margin:12px 0 16px;font-size:36px}
.modal .stars-row span{opacity:.2;transition:opacity .4s}
.modal .stars-row span.earned{opacity:1;animation:star-pop .5s ease}
.modal p{color:rgba(255,255,255,.6);font-size:14px;margin-bottom:20px;line-height:1.5}
.modal .score-display{font-family:'Baloo 2',cursive;font-size:36px;color:var(--gold);margin:8px 0}
.modal-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.modal-btn{padding:12px 28px;border-radius:50px;border:none;font-family:'Fredoka',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:transform .15s}
.modal-btn:active{transform:scale(.95)}
.modal-btn.primary{background:linear-gradient(135deg,#ff3b88,#ff8b3b);color:#fff;box-shadow:0 4px 20px rgba(255,59,136,.4)}
.modal-btn.secondary{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.15)}

/* ── Combo text ── */
.combo-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Baloo 2',cursive;font-size:32px;color:#fff;text-shadow:0 0 20px rgba(255,59,136,.8);z-index:30;pointer-events:none;animation:combo-show .8s ease forwards}
@keyframes combo-show{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}60%{transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-60%) scale(1)}}

/* ── Bottom buttons ── */
.bottom-bar{width:100%;max-width:400px;display:flex;gap:8px;padding:8px 16px 12px;z-index:5}
.bottom-btn{flex:1;padding:10px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);font-family:'Fredoka',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center}
.bottom-btn:active{background:rgba(255,255,255,.12);transform:scale(.95)}
.bottom-btn .icon{font-size:18px;display:block;margin-bottom:2px}

/* Responsive board sizing */
@media(max-height:700px){.hud-val{font-size:18px}.level-banner{font-size:13px;margin:2px 0 4px}}
</style>
</head>
<body>
<div id="app">
  <!-- BG Particles -->
  <div class="bg-particles" id="particles"></div>

  <!-- ═══ TITLE SCREEN ═══ -->
  <div class="screen" id="titleScreen">
    <div class="title-candies">
      <div class="title-candy"></div><div class="title-candy"></div><div class="title-candy"></div>
      <div class="title-candy"></div><div class="title-candy"></div><div class="title-candy"></div>
    </div>
    <div class="title-logo">Sweet<br>Crush</div>
    <div class="title-sub">MATCH · 3 · PUZZLE</div>
    <button class="btn-play" onclick="startGame()">▶ PLAY</button>
    <div style="margin-top:20px;color:rgba(255,255,255,.3);font-size:11px">Swipe to match 3 or more</div>
  </div>

  <!-- ═══ GAME SCREEN ═══ -->
  <div class="screen hidden" id="gameScreen">
    <div class="hud">
      <div class="hud-box"><div class="hud-label">Score</div><div class="hud-val score" id="scoreVal">0</div></div>
      <div class="hud-box"><div class="hud-label">Target</div><div class="hud-val target" id="targetVal">0</div></div>
      <div class="hud-box"><div class="hud-label">Moves</div><div class="hud-val moves" id="movesVal">0</div></div>
    </div>
    <div class="level-banner" id="levelBanner">Level 1</div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="star-markers"><span class="star-marker" id="star1">⭐</span><span class="star-marker" id="star2">⭐</span><span class="star-marker" id="star3">⭐</span></div>
    </div>
    <div class="board-wrap"><div class="board" id="board"></div></div>
    <div class="bottom-bar">
      <button class="bottom-btn" onclick="useHint()"><span class="icon">💡</span>Hint</button>
      <button class="bottom-btn" onclick="shuffleBoard()"><span class="icon">🔀</span>Shuffle</button>
      <button class="bottom-btn" onclick="showMenu()"><span class="icon">⚙️</span>Menu</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// SWEET CRUSH — Complete Match-3 Puzzle Game Engine
// ═══════════════════════════════════════════════════════════════

const CANDY_EMOJIS = ['🔴','🟠','🟡','🟢','🔵','🟣'];
const CANDY_COUNT = 6;
const COLS = 8;
const ROWS = 9;
const SWAP_ANIM = 250;
const DROP_ANIM = 300;
const MATCH_ANIM = 350;

// ── Game State ──
let board = [];
let score = 0;
let moves = 0;
let maxMoves = 25;
let target = 1000;
let level = 1;
let selected = null;
let locked = false;
let combo = 0;
let hintsUsed = 0;
let shufflesUsed = 0;
let highScore = parseInt(localStorage.getItem('sweetcrush_hs') || '0');
let maxLevel = parseInt(localStorage.getItem('sweetcrush_ml') || '1');

// ── Level Definitions (30 levels) ──
const LEVELS = [];
for (let i = 1; i <= 30; i++) {
  LEVELS.push({
    target: 800 + i * 400,
    moves: Math.max(15, 30 - Math.floor(i / 4)),
    rows: Math.min(9, 7 + Math.floor(i / 10)),
    cols: 8,
    candies: Math.min(6, 5 + Math.floor(i / 8)),
    star1: 0.6, star2: 0.8, star3: 1.0
  });
}

// ── BG Particles ──
function initParticles() {
  const c = document.getElementById('particles');
  for (let i = 0; i < 25; i++) {
    const s = document.createElement('span');
    s.style.left = Math.random() * 100 + '%';
    s.style.animationDuration = (8 + Math.random() * 12) + 's';
    s.style.animationDelay = Math.random() * 10 + 's';
    s.style.width = s.style.height = (2 + Math.random() * 4) + 'px';
    c.appendChild(s);
  }
}

// ── Board Init ──
function createBoard(rows, cols, candyTypes) {
  board = [];
  for (let r = 0; r < rows; r++) {
    board[r] = [];
    for (let c = 0; c < cols; c++) {
      let type;
      do {
        type = Math.floor(Math.random() * candyTypes);
      } while (
        (c >= 2 && board[r][c-1]?.type === type && board[r][c-2]?.type === type) ||
        (r >= 2 && board[r-1]?.[c]?.type === type && board[r-2]?.[c]?.type === type)
      );
      board[r][c] = { type, special: null };
    }
  }
}

function renderBoard() {
  const el = document.getElementById('board');
  const lvl = LEVELS[level - 1];
  const rows = lvl.rows, cols = lvl.cols;
  const vw = Math.min(window.innerWidth - 16, 400);
  const vh = window.innerHeight - 240;
  const cellMax = Math.min(Math.floor((vw - 16 - (cols-1)*3) / cols), Math.floor((vh - 16 - (rows-1)*3) / rows));
  const cellSize = Math.max(32, Math.min(cellMax, 48));

  el.style.gridTemplateColumns = `repeat(${cols}, ${cellSize}px)`;
  el.style.gridTemplateRows = `repeat(${rows}, ${cellSize}px)`;
  el.innerHTML = '';

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.row = r;
      cell.dataset.col = c;
      cell.style.width = cellSize + 'px';
      cell.style.height = cellSize + 'px';

      if (board[r]?.[c]) {
        const candy = document.createElement('div');
        candy.className = `candy candy-${board[r][c].type}`;
        if (board[r][c].special === 'striped-h') candy.classList.add('striped-h');
        if (board[r][c].special === 'striped-v') candy.classList.add('striped-v');
        if (board[r][c].special === 'wrapped') candy.classList.add('wrapped');
        if (board[r][c].special === 'color-bomb') candy.classList.add('color-bomb');
        candy.textContent = board[r][c].special === 'color-bomb' ? '💎' : CANDY_EMOJIS[board[r][c].type];
        candy.id = `candy-${r}-${c}`;
        cell.appendChild(candy);
      }

      cell.addEventListener('pointerdown', (e) => onPointerDown(r, c, e));
      cell.addEventListener('pointerup', () => onPointerUp());
      el.appendChild(cell);
    }
  }
}

// ── Input Handling ──
let dragStart = null;
let dragStartPos = null;

function onPointerDown(r, c, e) {
  if (locked) return;
  e.preventDefault();
  dragStart = { r, c };
  dragStartPos = { x: e.clientX, y: e.clientY };

  if (selected) {
    const dr = Math.abs(selected.r - r);
    const dc = Math.abs(selected.c - c);
    if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
      trySwap(selected.r, selected.c, r, c);
      clearSelection();
      return;
    }
    clearSelection();
  }
  selectCandy(r, c);
}

function onPointerUp() {
  dragStart = null;
  dragStartPos = null;
}

document.addEventListener('pointermove', (e) => {
  if (!dragStart || !dragStartPos || locked) return;
  const dx = e.clientX - dragStartPos.x;
  const dy = e.clientY - dragStartPos.y;
  const threshold = 20;

  if (Math.abs(dx) > threshold || Math.abs(dy) > threshold) {
    let tr = dragStart.r, tc = dragStart.c;
    if (Math.abs(dx) > Math.abs(dy)) {
      tc += dx > 0 ? 1 : -1;
    } else {
      tr += dy > 0 ? 1 : -1;
    }
    const lvl = LEVELS[level - 1];
    if (tr >= 0 && tr < lvl.rows && tc >= 0 && tc < lvl.cols) {
      clearSelection();
      trySwap(dragStart.r, dragStart.c, tr, tc);
    }
    dragStart = null;
    dragStartPos = null;
  }
});

function selectCandy(r, c) {
  selected = { r, c };
  const el = document.getElementById(`candy-${r}-${c}`);
  if (el) el.classList.add('selected');
}

function clearSelection() {
  if (selected) {
    const el = document.getElementById(`candy-${selected.r}-${selected.c}`);
    if (el) el.classList.remove('selected');
  }
  selected = null;
}

// ── Swap ──
async function trySwap(r1, c1, r2, c2) {
  locked = true;
  animateSwap(r1, c1, r2, c2);
  await sleep(SWAP_ANIM);

  // Swap in data
  [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];

  const matches = findAllMatches();
  if (matches.length > 0) {
    moves--;
    updateHUD();
    combo = 0;
    await processMatches();
  } else {
    // Swap back
    [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];
    animateSwap(r1, c1, r2, c2);
    await sleep(SWAP_ANIM);
    renderBoard();
  }

  locked = false;
  checkGameState();
}

function animateSwap(r1, c1, r2, c2) {
  const e1 = document.getElementById(`candy-${r1}-${c1}`);
  const e2 = document.getElementById(`candy-${r2}-${c2}`);
  if (!e1 || !e2) return;
  const lvl = LEVELS[level - 1];
  const cellSize = parseInt(e1.parentElement.style.width);
  const gap = 3;
  const dx = (c2 - c1) * (cellSize + gap);
  const dy = (r2 - r1) * (cellSize + gap);
  e1.style.transition = `transform ${SWAP_ANIM}ms ease`;
  e2.style.transition = `transform ${SWAP_ANIM}ms ease`;
  e1.style.transform = `translate(${dx}px, ${dy}px)`;
  e2.style.transform = `translate(${-dx}px, ${-dy}px)`;
}

// ── Match Finding ──
function findAllMatches() {
  const lvl = LEVELS[level - 1];
  const matched = new Set();

  // Horizontal
  for (let r = 0; r < lvl.rows; r++) {
    for (let c = 0; c < lvl.cols - 2; c++) {
      const t = board[r][c]?.type;
      if (t == null) continue;
      if (board[r][c+1]?.type === t && board[r][c+2]?.type === t) {
        let end = c + 2;
        while (end + 1 < lvl.cols && board[r][end+1]?.type === t) end++;
        for (let i = c; i <= end; i++) matched.add(`${r},${i}`);
      }
    }
  }
  // Vertical
  for (let c = 0; c < lvl.cols; c++) {
    for (let r = 0; r < lvl.rows - 2; r++) {
      const t = board[r][c]?.type;
      if (t == null) continue;
      if (board[r+1]?.[c]?.type === t && board[r+2]?.[c]?.type === t) {
        let end = r + 2;
        while (end + 1 < lvl.rows && board[end+1]?.[c]?.type === t) end++;
        for (let i = r; i <= end; i++) matched.add(`${i},${c}`);
      }
    }
  }
  return Array.from(matched).map(s => { const [r,c] = s.split(',').map(Number); return {r,c}; });
}

// ── Process Matches ──
async function processMatches() {
  let matches = findAllMatches();
  while (matches.length > 0) {
    combo++;
    const points = matches.length * 10 * combo;
    score += points;

    // Show combo text
    if (combo > 1) showCombo(combo);

    // Animate matched candies
    matches.forEach(({r, c}) => {
      const el = document.getElementById(`candy-${r}-${c}`);
      if (el) el.classList.add('matched');
    });

    // Score popup
    if (matches.length > 0) {
      const mid = matches[Math.floor(matches.length / 2)];
      showScorePopup(mid.r, mid.c, `+${points}`);
    }

    await sleep(MATCH_ANIM);

    // Create specials for 4+ matches
    createSpecials(matches);

    // Remove matched
    matches.forEach(({r, c}) => { board[r][c] = null; });

    // Drop candies
    dropCandies();
    renderBoard();
    await sleep(DROP_ANIM + 50);

    updateHUD();
    matches = findAllMatches();
  }
}

function createSpecials(matches) {
  // Check for L/T shapes (wrapped candy) or 4-in-a-row (striped) or 5+ (color bomb)
  const lvl = LEVELS[level - 1];

  // Group matches by rows and cols
  const rowGroups = {};
  const colGroups = {};
  matches.forEach(({r, c}) => {
    if (!rowGroups[r]) rowGroups[r] = [];
    rowGroups[r].push(c);
    if (!colGroups[c]) colGroups[c] = [];
    colGroups[c].push(r);
  });

  // 5+ in a line → color bomb
  for (const r in rowGroups) {
    rowGroups[r].sort((a,b) => a-b);
    let streak = 1;
    for (let i = 1; i < rowGroups[r].length; i++) {
      if (rowGroups[r][i] === rowGroups[r][i-1] + 1) streak++;
      else streak = 1;
      if (streak >= 5) {
        const c = rowGroups[r][i-2];
        board[r][c] = { type: board[r][c]?.type || 0, special: 'color-bomb' };
      }
    }
  }
  // 4 in a row → striped
  for (const r in rowGroups) {
    const cols = rowGroups[r].sort((a,b) => a-b);
    for (let i = 0; i <= cols.length - 4; i++) {
      if (cols[i+1] === cols[i]+1 && cols[i+2] === cols[i]+2 && cols[i+3] === cols[i]+3) {
        const c = cols[i+1];
        if (!board[r]?.[c]?.special) {
          board[r][c] = { type: board[r][c]?.type || 0, special: 'striped-h' };
        }
      }
    }
  }
  for (const c in colGroups) {
    const rows = colGroups[c].sort((a,b) => a-b);
    for (let i = 0; i <= rows.length - 4; i++) {
      if (rows[i+1] === rows[i]+1 && rows[i+2] === rows[i]+2 && rows[i+3] === rows[i]+3) {
        const r = rows[i+1];
        if (!board[r]?.[c]?.special) {
          board[r][c] = { type: board[r][c]?.type || 0, special: 'striped-v' };
        }
      }
    }
  }
}

function dropCandies() {
  const lvl = LEVELS[level - 1];
  for (let c = 0; c < lvl.cols; c++) {
    let empty = 0;
    for (let r = lvl.rows - 1; r >= 0; r--) {
      if (!board[r][c]) {
        empty++;
      } else if (empty > 0) {
        board[r + empty][c] = board[r][c];
        board[r][c] = null;
      }
    }
    // Fill top with new candies
    for (let r = 0; r < empty; r++) {
      board[r][c] = { type: Math.floor(Math.random() * lvl.candies), special: null };
    }
  }
}

// ── UI Helpers ──
function showScorePopup(r, c, text) {
  const boardEl = document.getElementById('board');
  const popup = document.createElement('div');
  popup.className = 'score-popup';
  popup.textContent = text;
  const cellSize = parseInt(boardEl.querySelector('.cell')?.style.width || '40');
  popup.style.left = (c * (cellSize + 3) + cellSize/2) + 'px';
  popup.style.top = (r * (cellSize + 3)) + 'px';
  popup.style.fontSize = combo > 2 ? '22px' : '16px';
  boardEl.appendChild(popup);
  setTimeout(() => popup.remove(), 800);
}

function showCombo(n) {
  const texts = ['', '', 'Sweet! 🍬', 'Delicious! 🍭', 'Amazing! 🎉', 'Incredible! 💥', 'DIVINE! 👑'];
  const text = texts[Math.min(n, texts.length - 1)] || `${n}x COMBO! 🔥`;
  const el = document.createElement('div');
  el.className = 'combo-text';
  el.textContent = text;
  document.getElementById('board').appendChild(el);
  setTimeout(() => el.remove(), 900);
}

function updateHUD() {
  document.getElementById('scoreVal').textContent = score.toLocaleString();
  document.getElementById('movesVal').textContent = moves;
  document.getElementById('targetVal').textContent = target.toLocaleString();
  document.getElementById('levelBanner').textContent = `Level ${level}`;

  // Progress bar
  const pct = Math.min(100, (score / target) * 100);
  document.getElementById('progressFill').style.width = pct + '%';

  // Stars
  const lvl = LEVELS[level - 1];
  [['star1', lvl.star1], ['star2', lvl.star2], ['star3', lvl.star3]].forEach(([id, threshold]) => {
    const el = document.getElementById(id);
    if (score >= target * threshold) el.classList.add('earned');
    else el.classList.remove('earned');
  });
}

// ── Hint ──
function useHint() {
  if (locked) return;
  const lvl = LEVELS[level - 1];
  for (let r = 0; r < lvl.rows; r++) {
    for (let c = 0; c < lvl.cols; c++) {
      // Try swap right
      if (c + 1 < lvl.cols) {
        [board[r][c], board[r][c+1]] = [board[r][c+1], board[r][c]];
        if (findAllMatches().length > 0) {
          [board[r][c], board[r][c+1]] = [board[r][c+1], board[r][c]];
          const e1 = document.getElementById(`candy-${r}-${c}`);
          const e2 = document.getElementById(`candy-${r}-${c+1}`);
          if (e1) e1.classList.add('hint');
          if (e2) e2.classList.add('hint');
          setTimeout(() => { e1?.classList.remove('hint'); e2?.classList.remove('hint'); }, 2000);
          return;
        }
        [board[r][c], board[r][c+1]] = [board[r][c+1], board[r][c]];
      }
      // Try swap down
      if (r + 1 < lvl.rows) {
        [board[r][c], board[r+1][c]] = [board[r+1][c], board[r][c]];
        if (findAllMatches().length > 0) {
          [board[r][c], board[r+1][c]] = [board[r+1][c], board[r][c]];
          const e1 = document.getElementById(`candy-${r}-${c}`);
          const e2 = document.getElementById(`candy-${r+1}-${c}`);
          if (e1) e1.classList.add('hint');
          if (e2) e2.classList.add('hint');
          setTimeout(() => { e1?.classList.remove('hint'); e2?.classList.remove('hint'); }, 2000);
          return;
        }
        [board[r][c], board[r+1][c]] = [board[r+1][c], board[r][c]];
      }
    }
  }
  // No moves available
  shuffleBoard();
}

function shuffleBoard() {
  if (locked) return;
  const lvl = LEVELS[level - 1];
  const all = [];
  for (let r = 0; r < lvl.rows; r++)
    for (let c = 0; c < lvl.cols; c++)
      if (board[r][c]) all.push(board[r][c]);
  // Fisher-Yates shuffle
  for (let i = all.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [all[i], all[j]] = [all[j], all[i]];
  }
  let idx = 0;
  for (let r = 0; r < lvl.rows; r++)
    for (let c = 0; c < lvl.cols; c++)
      board[r][c] = all[idx++];
  renderBoard();
}

// ── Game State Checks ──
function checkGameState() {
  if (score >= target) {
    setTimeout(() => showWin(), 300);
  } else if (moves <= 0) {
    setTimeout(() => showLose(), 300);
  }
}

function showWin() {
  locked = true;
  const lvl = LEVELS[level - 1];
  const stars = (score >= target * lvl.star3) ? 3 : (score >= target * lvl.star2) ? 2 : 1;
  if (score > highScore) { highScore = score; localStorage.setItem('sweetcrush_hs', highScore); }
  if (level >= maxLevel) { maxLevel = level + 1; localStorage.setItem('sweetcrush_ml', maxLevel); }

  showModal('🎉 Level Complete!', `Score: ${score.toLocaleString()}`, stars, [
    { text: 'Next Level ▶', cls: 'primary', fn: () => { level++; startLevel(); } },
    { text: 'Menu', cls: 'secondary', fn: showTitle },
  ]);
}

function showLose() {
  locked = true;
  showModal('😢 Out of Moves!', `Score: ${score.toLocaleString()} / ${target.toLocaleString()}`, 0, [
    { text: '🔄 Retry', cls: 'primary', fn: () => startLevel() },
    { text: 'Menu', cls: 'secondary', fn: showTitle },
  ]);
}

function showMenu() {
  showModal('⚙️ Paused', `Level ${level} · Score: ${score.toLocaleString()}\nHigh Score: ${highScore.toLocaleString()}`, -1, [
    { text: '▶ Resume', cls: 'primary', fn: closeModal },
    { text: '🔄 Restart Level', cls: 'secondary', fn: () => startLevel() },
    { text: '🏠 Main Menu', cls: 'secondary', fn: showTitle },
  ]);
}

// ── Modal System ──
let modalEl = null;
function showModal(title, body, stars, buttons) {
  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  const modal = document.createElement('div');
  modal.className = 'modal';
  modal.innerHTML = `<h2>${title}</h2>`;

  if (stars >= 0) {
    const row = document.createElement('div');
    row.className = 'stars-row';
    for (let i = 0; i < 3; i++) {
      const s = document.createElement('span');
      s.textContent = '⭐';
      if (i < stars) { s.classList.add('earned'); s.style.animationDelay = (i * 0.2) + 's'; }
      row.appendChild(s);
    }
    modal.appendChild(row);
  }

  const p = document.createElement('p');
  p.innerHTML = body.replace(/\n/g, '<br>');
  modal.appendChild(p);

  const btns = document.createElement('div');
  btns.className = 'modal-btns';
  buttons.forEach(b => {
    const btn = document.createElement('button');
    btn.className = `modal-btn ${b.cls}`;
    btn.textContent = b.text;
    btn.onclick = () => { closeModal(); b.fn(); };
    btns.appendChild(btn);
  });
  modal.appendChild(btns);
  overlay.appendChild(modal);
  document.getElementById('app').appendChild(overlay);
  modalEl = overlay;
}

function closeModal() {
  if (modalEl) { modalEl.remove(); modalEl = null; }
}

// ── Game Flow ──
function startGame() {
  level = 1;
  document.getElementById('titleScreen').classList.add('hidden');
  document.getElementById('gameScreen').classList.remove('hidden');
  startLevel();
}

function startLevel() {
  closeModal();
  if (level > LEVELS.length) level = LEVELS.length;
  const lvl = LEVELS[level - 1];
  score = 0;
  moves = lvl.moves;
  maxMoves = lvl.moves;
  target = lvl.target;
  combo = 0;
  selected = null;
  locked = false;
  createBoard(lvl.rows, lvl.cols, lvl.candies);

  // Ensure no initial matches
  let safety = 0;
  while (findAllMatches().length > 0 && safety < 100) {
    createBoard(lvl.rows, lvl.cols, lvl.candies);
    safety++;
  }

  renderBoard();
  updateHUD();
  document.getElementById('gameScreen').classList.remove('hidden');
  document.getElementById('titleScreen').classList.add('hidden');
}

function showTitle() {
  closeModal();
  document.getElementById('titleScreen').classList.remove('hidden');
  document.getElementById('gameScreen').classList.add('hidden');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── Init ──
initParticles();
</script>
